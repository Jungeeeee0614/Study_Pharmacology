<title>Autonomic Pharmacology Mastery Suite</title> 
<style> 
/* Forces the webpage to take up 100% of the browser window size */ 
html, body { margin: 0; padding: 0; width: 100%; height: 100%; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f3f4; overflow-x: hidden; } 
body { display: flex; flex-direction: column; padding: 15px; } 
header { text-align: center; margin-bottom: 10px; flex-shrink: 0; } 
h1 { color: #2c3e50; margin: 0 0 5px 0; font-size: 1.8rem; } 
p { color: #7f8c8d; margin: 0 0 10px 0; font-size: 0.95rem; } 

/* Dashboard Button Bar styling */
#mode-dashboard {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 15px;
    flex-shrink: 0;
}
.mode-btn {
    background-color: #7f8c8d;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: bold;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background-color 0.2s, transform 0.1s;
}
.mode-btn:active { transform: scale(0.98); }
.active-mode {
    background-color: #e67e22 !important; /* Highlights active test mode in orange */
    box-shadow: 0 4px 10px rgba(230, 126, 34, 0.3);
}

#game-container { display: flex; flex-direction: column; flex-grow: 1; width: 100%; gap: 15px; min-height: 0; } 
#cards-pool { display: flex; flex-wrap: wrap; gap: 10px; padding: 15px; background: #ffffff; border: 2px dashed #b2bec3; border-radius: 8px; min-height: 80px; justify-content: center; align-items: center; flex-shrink: 0; } 
.drug-card { background-color: #0984e3; color: white; padding: 10px 16px; border-radius: 20px; cursor: grab; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); user-select: none; transition: transform 0.2s; font-size: 0.95rem; margin: 4px 2px; display: inline-block; } 
.drug-card:active { cursor: grabbing; transform: scale(1.05); } 

#classes-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; flex-grow: 1; min-height: 0; overflow-y: auto; padding-bottom: 10px; } 
.class-bucket { background-color: #ffffff; border: 2px solid #dfe6e9; border-radius: 8px; padding: 12px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: background 0.2s; min-height: 120px; } 
.class-bucket h3 { margin: 0 0 5px 0; text-align: center; color: #2d3436; border-bottom: 2px solid #00b894; padding-bottom: 5px; font-size: 0.95rem; } 
.drag-over { background-color: #e8f8f5; border-color: #00b894; } 
#footer-bar { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid #dcdde1; margin-top: auto; flex-shrink: 0; } 
#score-board { font-size: 1.2rem; font-weight: bold; color: #27ae60; } 
.fs-btn { background-color: #7f8c8d; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; } 
.fs-btn:hover { background-color: #2c3e50; } 
</style> 
</head>

function switchMode(newMode) {
